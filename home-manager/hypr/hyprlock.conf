background {
    path = /home/ta1/Pictures/Wallpapers/catsunset.png# Match your Hyprland wallpaper
    color = rgba(30, 30, 46, 0.8) 
    # Blur settings
    blur_passes = 1 # Higher = more blur
    blur_size = 3 
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

label {
    text = $TIME
    color = rgb(205, 214, 244) # Mocha Text
    font_size = 90
    font_weight = 900
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    size = 250, 50
    outline_thickness = 1 
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    placeholder_text = <i>Password ...</i> 
    # Use rgba(red, green, blue, alpha) 
    # 0.5 is 50% opacity
    inner_color = rgba(31, 31, 46, 0.5) 
    outer_color = rgba(180, 190, 254, 0.5)
    
    font_color = rgb(205, 214, 244) # Keep text solid for readability
    fade_on_empty = false #Set to false so you can always see the box
    
    position = 0, -20
    halign = center
    valign = center
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 1, linear
    animation = fadeOut, 1, 1, linear
}
