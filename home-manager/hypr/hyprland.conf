monitor = eDP-1, 1920x1080, 0x0, 1
# monitor = DP-1, 2560x1440, -2560x0, 1

monitor = desc:ASUSTek COMPUTER INC PA24ACRV S5LMYX000188, preferred, -5120x0, 1
monitor = desc:LG Electronics LG IPS QHD 202NTVS0Z279, 2560x1440, 1920x0, 1
monitor = desc:LG Electronics LG IPS QHD 306NTWG1W713, 2560x1440, -2560x0, 1
#monitor=,preferred,auto,auto

#################
### AUTOSTART ###
#################

exec-once = nm-applet &
exec-once = waybar
exec-once = fcitx5 -d 
exec-once = swww-daemon
exec-once = blueman-applet &
exec-once = hypridle
exec-once = hyprctl setcursor Adwaita 24
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nwg-dock-hyprland -d -nolauncher -hd 0 -mb 3 -i 40 -m 
exec-once = ~/dotfiles/hypr/scripts/dock.sh

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Adwaita
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORMTHEME, qt5ct
env = QT_IM_MODULE, fcitx
env = XMODIFIERS, @im=fcitx

general {
    gaps_in = 1
    gaps_out = 0 
    border_size = 1 

    col.active_border = rgba(a5adceaa)
    col.inactive_border = rgba(a5adceaa)

    # Resize windows by clicking and dragging on borders and gaps
    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 3
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}


animations {
    enabled = yes 

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true # Master switch for pseudotiling
    preserve_split = true 
}

master {
    new_status = master
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:escape
    kb_rules =
    repeat_rate = 50
    repeat_delay = 250

    follow_mouse = 1

    sensitivity = 0.5 

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

device {
    name = MX Anywhere 3S
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER 
$terminal = ghostty 
$fileManager = nautilus 
$menu = rofi -show drun
$logout = wlogout -b 5 --layout ~/dotfiles/wlogout/layout --css ~/dotfiles/wlogout/nova.css
$music = spotify
$wallpaper = waypaper


bind = $mainMod, A, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, togglesplit, 
bind = $mainMod, H, exec, $wallpaper
bind = $mainMod, backslash, exec, $music
bind = alt Ctrl, delete, exec, $logout

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

plugin {
   hyprexpo {
        columns = 2
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current  
        skip-empty = true
    }
  
   hyprsplit{
     num_workspaces = 5
   }

   split-monitor-workspaces {
        count = 5
        keep_focused = 0
        enable_notifications = 0
        enable_persistent_workspaces = 1

        link_monitors = 0 # Setting this to 1 glitches workspace swap on external monitors 

        # monitor order
        monitor_priority = eDP-1, DP-1

        # set max workspaces per monitor
        max_workspaces = DP-1, 5
        max_workspaces = eDP-1, 5
    }

 }

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# bind = $mainMod, grave, hyprexpo:expo, toggle # View all workspaces
# bind = $mainMod, Tab, changemonitorsilent, current +1 # Moves selected window to another monitor
# bind = alt, Tab, split-grabroguewindows, 1 # Moves all windows to main display

# Scratch Pad
bind = $mainMod, S, togglespecialworkspace, magic

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume 
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86AudioPrev, exec, playerctl previous
bindel = ,XF86AudioPlay, exec, playerctl play-pause
bindel = ,XF86AudioNext, exec, playerctl next 

# Thinkpad Player control
bindel = ,XF86PickupPhone, exec, playerctl previous
bindel = ,XF86HangupPhone, exec, playerctl play-pause
bindel = ,XF86Favorites, exec, playerctl next

# Brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bind = ,XF86NotificationCenter, exec, swaync-client -t -sw &

bind = alt, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy

# Screenshot
$screenshot_dir=/home/ta1/Pictures/Screenshots
bind = alt SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, PRINT, exec, grim - | wl-copy
bind = alt SHIFT, 3, exec, grim "$screenshot_dir/$(date +%Y-%m-%d_%H-%M-%S).png"
bind = alt SHIFT, 4, exec, sh -c 'grim -g "$(slurp)" "$screenshot_dir/$(date +%Y-%m-%d_%H-%M-%S).png"'
bind = alt SHIFT, 1, exec,grim -g "$(slurp)" "/home/ta1/UBC/AirDrop-ish/$(date +%Y-%m-%d_%H-%M-%S).png" 

